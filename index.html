<body>

<!-- ============================================================
     ⚙️ SETUP — read this before you deploy

    <div class="loading-mark">P</div>
    <div class="loading-text">Loading the tracker…</div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const CONFIG = {
  SHEET_ID: "1xzm75NNc0SYSU7_Kpo0SHf3LZYAMZx8eYIddfOolRDY",
  ADMIN_PASSWORD: "Ambassadors1869",
  TRACKER_TAB: "Tracker",
  SUBMISSIONS_TAB: "Form Responses 1",
  GOOGLE_FORM_EMBED_URL: "https://docs.google.com/forms/d/e/1FAIpQLSe-TuzDshxPB3vm-qoGHx3nYSWO1y-VBdzW38OQ9T03F-A7og/viewform?embedded=true"

/* ============================================================
   PRIORITY TIERS — order = urgency, most urgent first
   ============================================================ */
const TIERS = [
  { name: "First Priority to Eval",  color: "#C1272D", text: "#fff", short: "Now" },
  { name: "Second Priority",         color: "#E63946", text: "#fff", short: "Soon" },
  { name: "Third Priority",          color: "#F4A261", text: "#1a1200", short: "This month" },
  { name: "Fourth Priority",         color: "#E9C46A", text: "#1a1200", short: "This cycle" },
  { name: "Fifth Priority",          color: "#8AB17D", text: "#0e1a0e", short: "Lower" },
  { name: "Last Priority",           color: "#457B9D", text: "#fff", short: "Low" },
  { name: "No Need to Eval",         color: "#6c757d", text: "#fff", short: "Not needed" },
  { name: "Evaled This Semester",    color: "#3a3a3a", text: "#CFB991", short: "Just evaled" },
  { name: "Not Needed to be Evaled", color: "#6c757d", text: "#fff", short: "New / not needed" }
];
function tierFor(name){
  return TIERS.find(t => t.name === name) || { name: name || "Unranked", color:"#3a3a3a", text:"#fff", short:"" };
}

/* ============================================================
   STYLES
   ============================================================ */
const style = document.createElement('style');

  }

  .tab.active{ color:var(--gold); border-bottom-color:var(--gold); }

  .toolbar{ display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
  .search{
    flex:1; min-width:200px; background:var(--panel); border:1px solid var(--border); border-radius:8px;

  }
  .search:focus{ outline:none; border-color:var(--gold); }
  .stat-strip{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }

    background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:10px 16px;

  .tier{ border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); background:var(--panel); }

    display:flex; align-items:center; justify-content:space-between; padding:12px 18px; cursor:pointer;

  .guide-row{

  .guide-meta{ color:var(--text-dim); font-size:12px; font-family:'Space Mono'; text-align:right; }
  .empty-tier{ padding:14px 24px; color:var(--text-dim); font-size:13px; font-style:italic; }

  .form-card{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:26px;
    max-width:760px; margin:0 auto;
  }
  .form-embed-wrap{ border-radius:8px; overflow:hidden; border:1px solid var(--border); background:#fff; }
  .form-embed-wrap iframe{ display:block; }
  .form-card h2{ font-size:20px; margin-top:0; color:var(--gold); }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim); margin-bottom:6px; }
  .field input, .field select, .field textarea{
    width:100%; background:var(--panel-2); border:1px solid var(--border); border-radius:8px;
    padding:10px 12px; color:var(--text); font-family:'Inter'; font-size:14px;
  }
  .field textarea{ min-height:80px; resize:vertical; }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--gold); }
  .row-2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .rating-group{ display:flex; gap:8px; }
  .rating-opt{
    flex:1; text-align:center; padding:10px 0; border:1px solid var(--border); border-radius:8px; cursor:pointer;
    font-family:'Oswald'; color:var(--text-dim);
  }
  .rating-opt.selected{ border-color:var(--gold); color:var(--gold); background:#2a2410; }

  .admin-only{ display:none; }
  body.is-admin .admin-only{ display:block; }

  .sub-log{ display:flex; flex-direction:column; gap:10px; }
  .sub-item{ background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:14px 16px; }

  .modal-bg{

  }
  .modal-bg.open{ display:flex; }

    background:var(--panel); border:1px solid var(--gold-dim); border-radius:12px; padding:28px; width:300px;
  }
  .modal h3{ margin-top:0; color:var(--gold); font-size:16px; }
  .modal input{
    width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:var(--panel-2);
    color:var(--text); margin:12px 0; font-family:'Inter';
  }
  .modal .modal-actions{ display:flex; gap:8px; justify-content:flex-end; }
  .modal-err{ font-size:12px; color:#E63946; min-height:16px; }

  footer{ text-align:center; padding:30px; color:var(--text-dim); font-size:12px; }

  @media (max-width:600px){
    .row-2{ grid-template-columns:1fr; }
    header.top{ padding:14px 16px; }
    main{ padding:20px 14px 60px; }
  }
`;
document.head.appendChild(style);

/* ============================================================
   GVIZ LOADER
   ============================================================ */
function loadTab(tabName, cb, sheetId){
  sheetId = sheetId || CONFIG.SHEET_ID;
  const cbName = 'gvizcb_' + tabName.replace(/\W/g,'') + '_' + Math.floor(Math.random()*1e9);
  window[cbName] = function(json){
    cb(json);
    delete window[cbName];
    tag.remove();
  };
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler=${cbName}&sheet=${encodeURIComponent(tabName)}&ts=${Date.now()}`;
  const tag = document.createElement('script');
  tag.src = url;
  tag.onerror = () => cb(null);
  document.body.appendChild(tag);
}
function rowsFromGviz(json){
  if(!json || !json.table || !json.table.rows) return [];
  return json.table.rows.map(r => (r.c||[]).map(c => c ? (c.f !== undefined ? c.f : c.v) : ""));
}

/* ============================================================
   STATE
   ============================================================ */
let trackerRows = [];
let submissionRows = [];
let isAdmin = false;

/* ============================================================
   RENDER SHELL
   ============================================================ */
function renderShell(){
  document.getElementById('app').innerHTML = `
    <header class="top">
      <div class="brand">
        <div class="mark">P</div>
        <div>
          <h1>Fall '26 Eval Tracker</h1>
          <div class="sub">Purdue Admissions Office · Tour Guide Evaluations</div>
        </div>
      </div>
      <div class="admin-controls">
        <span class="badge-admin admin-only">ADMIN VIEW</span>
        <button class="btn" id="adminBtn">Sign in as Admin</button>
      </div>
    </header>
    <main>
      <div class="tabs">
        <div class="tab active" data-view="tracker">Tracker</div>
        <div class="tab" data-view="submit">Submit an Eval</div>
        <div class="tab admin-only" data-view="log">Submission Log</div>
      </div>

      <div class="view active" id="view-tracker">
        <div class="stat-strip" id="statStrip"></div>
        <div class="toolbar">
          <input class="search" id="searchBox" placeholder="Search a guide by name…">
        </div>
        <div class="ladder" id="ladder"></div>
      </div>

      <div class="view" id="view-submit">
        <div class="form-card">
          <h2>Submit an Evaluation</h2>
          <div id="formArea"></div>
        </div>
      </div>

      <div class="view admin-only" id="view-log">
        <h2 style="font-size:18px;color:var(--gold);">Recent Submissions</h2>
        <div class="sub-log" id="subLog"></div>
      </div>
    </main>
    <footer>Data lives in Google Sheets · updates every time you reload this page</footer>

    <div class="modal-bg" id="modalBg">
      <div class="modal">
        <h3>Admin Sign In</h3>
        <input type="password" id="adminPass" placeholder="Password">
        <div class="modal-err" id="modalErr"></div>
        <div class="modal-actions">
          <button class="btn" id="modalCancel">Cancel</button>
          <button class="btn btn-primary" id="modalGo">Sign In</button>
        </div>
      </div>
    </div>
  `;

  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('view-'+t.dataset.view).classList.add('active');
    });
  });

  document.getElementById('adminBtn').addEventListener('click', ()=>{
    if(isAdmin){
      isAdmin = false;
      document.body.classList.remove('is-admin');
      document.getElementById('adminBtn').textContent = 'Sign in as Admin';
      return;
    }
    document.getElementById('modalBg').classList.add('open');
    document.getElementById('adminPass').value='';
    document.getElementById('modalErr').textContent='';
    document.getElementById('adminPass').focus();
  });
  document.getElementById('modalCancel').addEventListener('click', ()=>{
    document.getElementById('modalBg').classList.remove('open');
  });
  document.getElementById('modalGo').addEventListener('click', tryAdminLogin);
  document.getElementById('adminPass').addEventListener('keydown', e=>{ if(e.key==='Enter') tryAdminLogin(); });

  document.getElementById('searchBox').addEventListener('input', renderLadder);
}

function tryAdminLogin(){
  const val = document.getElementById('adminPass').value;
  if(val === CONFIG.ADMIN_PASSWORD){
    isAdmin = true;
    document.body.classList.add('is-admin');
    document.getElementById('adminBtn').textContent = 'Sign out of Admin';
    document.getElementById('modalBg').classList.remove('open');
    renderSubmissionLog();
  } else {
    document.getElementById('modalErr').textContent = 'Incorrect password.';
  }
}

/* ============================================================
   TRACKER VIEW
   ============================================================ */
function renderStats(){
  const total = trackerRows.length;
  const needsNow = trackerRows.filter(r => tierFor(r[2]).name === "First Priority to Eval").length;
  const evaled = trackerRows.filter(r => ["Evaled This Semester","No Need to Eval"].includes(tierFor(r[2]).name)).length;
  document.getElementById('statStrip').innerHTML = `
    <div class="stat"><b>${total}</b>Total Guides</div>
    <div class="stat"><b>${needsNow}</b>First Priority</div>
    <div class="stat"><b>${evaled}</b>Covered This Cycle</div>
  `;
}

function renderLadder(){
  const q = (document.getElementById('searchBox').value || "").toLowerCase();
  const grouped = {};
  TIERS.forEach(t => grouped[t.name] = []);
  trackerRows.forEach(r=>{
    const [first,last,priority,date,time,evaler] = r;
    const name = `${first||""} ${last||""}`.trim();
    if(q && !name.toLowerCase().includes(q)) return;
    const tierName = tierFor(priority).name;
    if(!grouped[tierName]) grouped[tierName] = [];
    grouped[tierName].push({first,last,date,time,evaler});
  });

  const ladder = document.getElementById('ladder');
  ladder.innerHTML = TIERS.map((tier, idx) => {
    const list = grouped[tier.name] || [];
    if(list.length === 0 && q) return "";
    const rowsHtml = list.length ? list.map(p => `
      <div class="guide-row">
        <div class="guide-name">${p.first} ${p.last}</div>
        <div class="guide-meta">${p.evaler ? 'Evaluator: '+p.evaler : ''} ${p.date ? '· '+p.date : ''}</div>
      </div>
    `).join('') : `<div class="empty-tier">No one in this tier${q ? ' matching your search' : ''}.</div>`;
    return `
      <div class="tier ${idx===0 ? 'open':''}" style="--tier-color:${tier.color}">
        <div class="tier-head" onclick="this.parentElement.classList.toggle('open')">
          <h3><span style="width:10px;height:10px;border-radius:50%;background:${tier.color};display:inline-block;"></span>${tier.name}</h3>
          <div style="display:flex;align-items:center;gap:14px;">
            <span class="tier-count">${list.length} guide${list.length===1?'':'s'}</span>
            <span class="chevron">▾</span>
          </div>
        </div>
        <div class="tier-body">${rowsHtml}</div>
      </div>
    `;
  }).join('');
}

/* ============================================================
   SUBMIT VIEW — embeds the real Google Form, no backend needed
   ============================================================ */
function renderForm(){
  document.getElementById('formArea').innerHTML = `
    <p style="color:var(--text-dim);font-size:13px;margin-top:0;">
      This is the same eval form the committee has always used — it's just embedded here for convenience.
      Submissions go straight into the usual response sheet.
    </p>
    <div class="form-embed-wrap">
      <iframe src="${CONFIG.GOOGLE_FORM_EMBED_URL}" width="100%" height="1400" frameborder="0" marginheight="0" marginwidth="0">Loading form…</iframe>
    </div>
  `;
}

/* ============================================================
   ADMIN: SUBMISSION LOG
   ============================================================ */
function renderSubmissionLog(){
  const el = document.getElementById('subLog');
  if(!submissionRows.length){
    el.innerHTML = `<div class="empty-tier">No submissions yet.</div>`;
    return;
  }
  // Real sheet column order:
  // 0 Timestamp, 1 Tour Time, 2 Tour Date, 3 Guide Name, 4 Evaluator, 5 Uniform,
  // 6 Communication, 7 explain, 8 Spirit, 9 explain, 10 Knowledge, 11 explain,
  // 12 Adapt, 13 explain, 14 Professionalism, 15 explain, 16 Engagement, 17 explain,
  // 18 Timing, 19 explain, 20 Notes, 21 Overall
  el.innerHTML = submissionRows.slice().reverse().map(r=>{
    const timestamp=r[0], guide=r[3], evaluator=r[4], overall=r[21], notes=r[20];
    return `
      <div class="sub-item">
        <div class="top-line">
          <span>${guide || ""} · Overall ${overall || "–"}/5</span>
          <span>${evaluator || ""} · ${timestamp || ""}</span>
        </div>
        <div class="body-text">
          ${notes ? `<div><b>Notes:</b> ${notes}</div>` : ""}
        </div>
      </div>
    `;
  }).join('');
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  renderShell();
  loadTab(CONFIG.TRACKER_TAB, (json)=>{
    trackerRows = rowsFromGviz(json).filter(r => r[0]);
    renderStats();
    renderLadder();
    renderForm();
    loadTab(CONFIG.SUBMISSIONS_TAB, (json2)=>{
      submissionRows = rowsFromGviz(json2).filter(r => r[0]);
      renderSubmissionLog();
    });
  });
}
boot();
</script>
</body>
