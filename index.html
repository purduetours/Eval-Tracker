/* ============================================================
   GVIZ LOADER
   ============================================================ */
function loadTab(gid, cb){
  window.google = window.google || {};
  window.google.visualization = window.google.visualization || {};
  window.google.visualization.Query = window.google.visualization.Query || {};
  window.google.visualization.Query.setResponse = function(json){
    cb(json);
    tag.remove();
  };
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}&ts=${Date.now()}`;
  const tag = document.createElement('script');
  tag.src = url;
  tag.onerror = () => cb(null);
  document.body.appendChild(tag);
}
function rowsFromGviz(json){
  if(!json || !json.table || !json.table.rows) return [];
  return json.table.rows.map(r => (r.c||[]).map(c => c ? (c.f !== undefined ? c.f : c.v) : ""));
}

/* ============================================================
   TRACKER VIEW — full data table, all columns, sortable
   ============================================================ */
const TABLE_COLS = [
  { key: 0, label: "First Name" },
  { key: 1, label: "Last Name" },
  { key: 2, label: "Eval Priority" },
  { key: 3, label: "Tour Eval Date" },
  { key: 4, label: "Tour Eval Time" },
  { key: 5, label: "Evaluator" },
  { key: 6, label: "Form Submitted?" },
  { key: 7, label: "Feedback Reviewed?" }
];
let sortCol = 2, sortDir = 1;

function renderStats(){
  const total = trackerRows.length;
  const needsNow = trackerRows.filter(r => tierFor(r[2]).name === "First Priority to Eval").length;
  const evaled = trackerRows.filter(r => ["Evaled This Semester","No Need to Eval","Not Needed to be Evaled"].includes(tierFor(r[2]).name)).length;
  document.getElementById('statStrip').innerHTML = `
    <div class="stat"><b>${total}</b>Total Guides</div>
    <div class="stat"><b>${needsNow}</b>First Priority</div>
    <div class="stat"><b>${evaled}</b>Covered This Cycle</div>
  `;
}

function renderTable(){
  const q = (document.getElementById('searchBox').value || "").toLowerCase();
  let rows = trackerRows.filter(r=>{
    if(!q) return true;
    const name = `${r[0]||""} ${r[1]||""}`.toLowerCase();
    return name.includes(q);
  });

  const tierRank = t => { const i = TIERS.findIndex(x => x.name === tierFor(t).name); return i === -1 ? 99 : i; };
  rows = rows.slice().sort((a,b)=>{
    let av = sortCol === 2 ? tierRank(a[2]) : (a[sortCol] || "");
    let bv = sortCol === 2 ? tierRank(b[2]) : (b[sortCol] || "");
    if(typeof av === 'string') av = av.toLowerCase();
    if(typeof bv === 'string') bv = bv.toLowerCase();
    if(av < bv) return -1*sortDir;
    if(av > bv) return 1*sortDir;
    return 0;
  });

  const table = document.getElementById('trackerTable');
  const theadHtml = `<thead><tr>${TABLE_COLS.map(c=>`
    <th data-col="${c.key}">${c.label}${sortCol===c.key ? `<span class="sort-arrow">${sortDir===1?'▲':'▼'}</span>` : ''}</th>
  `).join('')}</tr></thead>`;

  const bodyRows = rows.length ? rows.map(r=>{
    const tier = tierFor(r[2]);
    return `<tr>
      <td class="name-cell">${r[0]||''}</td>
      <td class="name-cell">${r[1]||''}</td>
      <td><span class="priority-pill" style="background:${tier.color};color:${tier.text};">${tier.name}</span></td>
      <td>${r[3]||''}</td>
      <td>${r[4]||''}</td>
      <td>${r[5]||''}</td>
      <td>${String(r[6]).toUpperCase()==='TRUE' ? '✅' : ''}</td>
      <td>${String(r[7]).toUpperCase()==='TRUE' ? '✅' : ''}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="8" style="text-align:center;color:var(--text-dim);padding:24px;">No guides match your search.</td></tr>`;

  table.innerHTML = theadHtml + `<tbody>${bodyRows}</tbody>`;

  table.querySelectorAll('th').forEach(th=>{
    th.addEventListener('click', ()=>{
      const col = Number(th.dataset.col);
      if(sortCol === col){ sortDir *= -1; } else { sortCol = col; sortDir = 1; }
      renderTable();
    });
  });
}

/* ============================================================
   SIGN UP FOR TOURS
   Grid layout mirrors the old Schedule tab: cohort columns, guides
   stacked underneath, color-coded by eval priority. Guides are
   chunked from Tracker into columns of 8 as a placeholder — swap
   CHUNK_SIZE / the data source once the real Fall 26 schedule
   sheet (grouped by actual tour cohort) is available.
   Claims are real now: clicking a guide opens the actual "Eval
   Claim" Google Form, and claims read back live from its response
   sheet — visible to everyone, not just one browser.
   ============================================================ */
let claimRows = []; // rows from the Eval Claim response sheet

function latestClaimFor(guideName){
  // Claim sheet columns: 0 Timestamp, 1 Guide, 2 Evaluator, 3 Date, 4 Time
  // Later rows are more recent; find the last matching one.
  for(let i = claimRows.length - 1; i >= 0; i--){
    const r = claimRows[i];
    if((r[1] || '').trim().toLowerCase() === guideName.trim().toLowerCase()){
      return { evaluator: r[2] || '', date: r[3] || '', time: r[4] || '' };
    }
  }
  return null;
}

function renderSignup(){
  const noteEl = document.getElementById('signupNote');
  noteEl.innerHTML = '';

  const grid = document.getElementById('signupGrid');
  const CHUNK_SIZE = 8;
  const chunks = [];
  for(let i=0; i<trackerRows.length; i += CHUNK_SIZE){
    chunks.push(trackerRows.slice(i, i+CHUNK_SIZE));
  }

  grid.innerHTML = chunks.map((chunk, colIdx) => `
    <div class="signup-col">
      <div class="signup-col-head">Group ${colIdx+1}</div>
      ${chunk.map(r => {
        const name = `${r[0]||''} ${r[1]||''}`.trim();
        const tier = tierFor(r[2]);
        const claim = latestClaimFor(name);
        return `
          <div class="signup-cell" style="background:${tier.color};color:${tier.text};" onclick="window.open(CONFIG.CLAIM_FORM_URL, '_blank')">
            <div>${name}</div>
            ${claim ? `<div class="signup-claim-tag">${claim.evaluator} · ${claim.date} ${claim.time}</div>` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `).join('');
}
const RESPONSE_FIELDS = [
  { idx: 5, label: "Correct Uniform?" },
  { idx: 6, label: "Communication Skills" }, { idx: 7, label: "— explanation" },
  { idx: 8, label: "School Spirit & Passion" }, { idx: 9, label: "— explanation" },
  { idx: 10, label: "Knowledge of Institution" }, { idx: 11, label: "— explanation" },
  { idx: 12, label: "Adaptability & Problem-Solving" }, { idx: 13, label: "— explanation" },
  { idx: 14, label: "Professionalism" }, { idx: 15, label: "— explanation" },
  { idx: 16, label: "Engagement & Charisma" }, { idx: 17, label: "— explanation" },
  { idx: 18, label: "Route, Speed, & Timing" }, { idx: 19, label: "— explanation" },
  { idx: 20, label: "Anything else?" }
];

function renderSubmissionLog(){
  const el = document.getElementById('subLog');
  if(!submissionRows.length){
    el.innerHTML = `<div class="empty-tier">No submissions yet.</div>`;
    return;
  }
  el.innerHTML = submissionRows.slice().reverse().map((r,i)=>{
    const timestamp=r[0], guide=r[3], evaluator=r[4], overall=r[21];
    const detailRows = RESPONSE_FIELDS.map(f => r[f.idx] ? `
      <div class="detail-row"><span class="detail-label">${f.label}</span><span class="detail-val">${r[f.idx]}</span></div>
    ` : '').join('');
    return `
      <div class="sub-item">
        <div class="top-line" style="cursor:pointer;" onclick="this.closest('.sub-item').classList.toggle('open')">
          <span>${guide || ""} · Overall ${overall || "–"}/5</span>
          <span>${evaluator || ""} · ${timestamp || ""} <span class="chevron">▾</span></span>
        </div>
        <div class="sub-detail">${detailRows || '<div class="empty-tier" style="padding:8px 0;">No further detail on this response.</div>'}</div>
      </div>
    `;
  }).join('');
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  renderShell();
  loadTab(CONFIG.TRACKER_GID, (json)=>{
    trackerRows = rowsFromGviz(json).filter(r => r[0]);
    renderStats();
    renderTable();
    renderSignup();
    loadTab(CONFIG.SUBMISSIONS_GID, (json2)=>{
      submissionRows = rowsFromGviz(json2).filter(r => r[0]);
      renderSubmissionLog();
      loadClaimSheet();
    });
  });
}

function loadClaimSheet(){
  window.google = window.google || {};
  window.google.visualization = window.google.visualization || {};
  window.google.visualization.Query = window.google.visualization.Query || {};
  window.google.visualization.Query.setResponse = function(json){
    claimRows = rowsFromGviz(json).filter(r => r[0]);
    renderSignup();
    tag.remove();
  };
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.CLAIM_SHEET_ID}/gviz/tq?tqx=out:json&gid=${CONFIG.CLAIM_GID}&ts=${Date.now()}`;
  const tag = document.createElement('script');
  tag.src = url;
  tag.onerror = () => { renderSignup(); };
  document.body.appendChild(tag);
}
boot();
</script>
